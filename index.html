<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khám Phá Du Lịch</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f6f8;
}

/* HEADER */
header{
    background:#0a3d62;
    color:white;
    text-align:center;
    padding:20px;
    font-size:26px;
}

/* MENU */
nav{
    background:#3c6382;
    padding:10px;
    text-align:center;
}
nav a{
    color:white;
    margin:0 15px;
    text-decoration:none;
    font-weight:bold;
}

/* BANNER */
.banner{
    height:350px;
    background:url('https://picsum.photos/1200/500') center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:40px;
    font-weight:bold;
}

/* SECTION */
.container{
    padding:20px;
}

/* CARD */
.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

.card img{
    width:100%;
}

.card-content{
    padding:15px;
}

.card h3{
    margin:0;
}

/* VIDEO */
.video{
    margin-top:20px;
}

/* FOOTER */
footer{
    background:#0a3d62;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}
</style>
</head>

<body>

<header>
    🌍 Khám Phá Du Lịch
</header>

<nav>
    <a href="#">Trang chủ</a>
    <a href="#">Địa điểm</a>
    <a href="#">Video</a>
    <a href="#">Liên hệ</a>
</nav>

<div class="banner">
    Du lịch khắp thế giới
</div>

<div class="container">

    <!-- ĐỊA ĐIỂM 1 -->
    <div class="card">
        <img src="https://picsum.photos/600/300">
        <div class="card-content">
            <h3>Vịnh Hạ Long</h3>
            <p>Di sản thiên nhiên thế giới nổi tiếng của Việt Nam.</p>
        </div>
    </div>

    <!-- ĐỊA ĐIỂM 2 -->
    <div class="card">
        <img src="https://picsum.photos/601/300">
        <div class="card-content">
            <h3>Đà Nẵng</h3>
            <p>Thành phố biển đẹp với nhiều địa điểm du lịch hấp dẫn.</p>
        </div>
    </div>

    <!-- VIDEO -->
    <div class="card video">
        <div class="card-content">
            <h3>🎬 Video du lịch</h3>
            <iframe width="100%" height="400"
            src="https://www.youtube.com/embed/dQw4w9WgXcQ"
            frameborder="0" allowfullscreen>
            </iframe>
        </div>
    </div>

</div>

<footer>
    © 2026 - Website du lịch của bạn
</footer>

</body>
</html>
