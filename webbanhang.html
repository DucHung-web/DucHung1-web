<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Shop của tôi</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: #333;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 24px;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 20px;
}

.product {
  background: white;
  margin: 15px;
  padding: 15px;
  width: 220px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.product img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  background: #28a745;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #218838;
}

.cart {
  position: fixed;
  right: 0;
  top: 0;
  width: 300px;
  height: 100%;
  background: white;
  border-left: 2px solid #ccc;
  padding: 15px;
  overflow-y: auto;
}

.cart h2 {
  text-align: center;
}

.cart-item {
  border-bottom: 1px solid #ddd;
  padding: 10px 0;
}

.total {
  font-weight: bold;
  margin-top: 10px;
}

.checkout {
  background: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>🛒 Shop của tôi</header>

<div class="container">

  <div class="product">
    <img src="https://picsum.photos/200?1">
    <h3>Áo đẹp</h3>
    <p>100.000đ</p>
    <button onclick="addToCart('Áo đẹp', 100000)">Mua</button>
  </div>

  <div class="product">
    <img src="https://picsum.photos/200?2">
    <h3>Giày xịn</h3>
    <p>200.000đ</p>
    <button onclick="addToCart('Giày xịn', 200000)">Mua</button>
  </div>

  <div class="product">
    <img src="https://picsum.photos/200?3">
    <h3>Mũ thời trang</h3>
    <p>80.000đ</p>
    <button onclick="addToCart('Mũ', 80000)">Mua</button>
  </div>

</div>

<div class="cart">
  <h2>Giỏ hàng</h2>
  <div id="cart-items"></div>
  <div class="total" id="total">Tổng: 0đ</div>
  <button class="checkout" onclick="checkout()">Thanh toán</button>
</div>

<script>
let cart = [];

function addToCart(name, price) {
  cart.push({name, price});
  renderCart();
}

function renderCart() {
  let html = "";
  let total = 0;

  cart.forEach(item => {
    html += `<div class="cart-item">${item.name} - ${item.price}đ</div>`;
    total += item.price;
  });

  document.getElementById("cart-items").innerHTML = html;
  document.getElementById("total").innerText = "Tổng: " + total + "đ";
}

function checkout() {
  if(cart.length === 0){
    alert("Giỏ hàng trống!");
    return;
  }
  alert("Thanh toán thành công 🎉");
  cart = [];
  renderCart();
}
</script>

</body>
</html>
